nginx:
  # 注意：现在全部使用下载编译的 nginx 版本的配置，不再使用独立的 nginx 目录
  # config_path 和 conf_dir 仅在找不到版本配置时作为备用
  # 实际配置文件位于: versions/<version>/conf/nginx.conf 和 versions/<version>/conf/conf.d/
  config_path: ../nginx/nginx.conf  # 已弃用，仅作为备用
  executable: /usr/sbin/nginx
  conf_dir: ../nginx/conf.d  # 已弃用，仅作为备用
  certbot_path: /usr/bin/certbot
  # 动态数据都放在 data 目录下
  static_dir: ../data/html
  log_dir: ../data/logs
  access_log: ../data/logs/access.log
  error_log: ../data/logs/error.log
  # 自动申请/续期成功后：写入 .crt（=fullchain）与 .key，并写入 {域名目录}/fullchain.pem、privkey.pem 供 Nginx 引用
  ssl_dir: ../data/ssl
  # Nginx 多版本管理相关目录（动态下载编译运行的数据）
  versions_root: ../data/nginx/versions
  build_root: ../data/nginx/build
  build_logs_dir: ../data/nginx/build_logs

app:
  host: 127.0.0.1
  port: 8000
  secret_key: # 从环境变量读取
  debug: true  # 调试模式，启用代码更改自动重载
  # 应用版本见同目录 VERSION 文件（与 config.yaml 分离，避免合并冲突）；勿在此写 version

backup:
  max_backups: 10
  # 备份目录放在 data 下
  backup_dir: ../data/backups

logrotate:
  # 是否启用自动日志轮转
  enabled: true
  # 保留天数（默认 7 天）
  retention_days: 7
  # 轮转时间，格式 HH:MM（默认每天凌晨 00:00）
  rotate_time: "00:00"

dynamic_registry:
  # 可选：显式注册白名单，支持逗号分隔的 IP/CIDR。留空时自动允许本机宿主机网段和容器网络同网段。
  # 来源 IP 不在白名单内时，注册/心跳/下线接口需要提供登录后的 Authorization: Bearer token
  # 或 Authorization: Basic base64(username:password)。
  ip_whitelist:
  # 可选：动态服务假域名后缀。留空时服务名本身就是 Host，例如 order-service。
  # 设置为 apps.local 时，同时支持 order-service 和 order-service.apps.local。
  domain_suffix:
  # 实例默认心跳超时时间（秒）
  default_ttl_seconds: 600
  # 过期实例清理间隔（秒）
  cleanup_interval_seconds: 30
  # 离线/过期实例保留时间（秒），超过后删除实例；服务无实例时同步删除服务
  offline_retention_seconds: 86400
  # 是否由本程序主动探测目标服务，探测可达时自动刷新心跳时间
  health_check_enabled: true
  # 主动探测目标服务的连接超时时间（秒）
  health_check_timeout_seconds: 3
