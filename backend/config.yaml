nginx:
  # 默认配置文件放在 nginx 目录下（与 app 同级）
  config_path: ../nginx/nginx.conf
  executable: /usr/sbin/nginx
  conf_dir: ../nginx/conf.d
  certbot_path: /usr/bin/certbot
  # 动态数据都放在 data 目录下
  static_dir: ../data/html
  log_dir: ../data/logs
  access_log: ../data/logs/access.log
  error_log: ../data/logs/error.log
  ssl_dir: ../data/ssl
  # Nginx 多版本管理相关目录（动态下载编译运行的数据）
  versions_root: ../data/nginx/versions
  build_root: ../data/nginx/build
  build_logs_dir: ../data/nginx/build_logs

app:
  host: 127.0.0.1
  port: 8000
  secret_key: # 从环境变量读取
  debug: true  # 调试模式，启用代码更改自动重载

backup:
  max_backups: 10
  # 备份目录放在 data 下
  backup_dir: ../data/backups

