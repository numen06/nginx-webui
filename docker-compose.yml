version: '3.8'

services:
  nginx-webui:
    image: registry.cn-shanghai.aliyuncs.com/numen/nginx-webui
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 与 backend/config.yaml 中 app.version 保持一致；也可用环境变量覆盖：APP_VERSION=1.0.3 docker compose build
        APP_VERSION: ${APP_VERSION:-1.0.2}
    ports:
      - "800:8000"
      - "443:443"
      - "80:80"
    volumes:
      - /opt/nginx-webui/data:/app/data
      - /opt/nginx-webui/letsencrypt:/etc/letsencrypt
    environment:
      - APP_PORT=8000
    restart: always
