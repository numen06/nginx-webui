version: '3.8'

services:
  nginx-webui:
    image: registry.cn-shanghai.aliyuncs.com/numen/nginx-webui
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "800:8000"
      - "443:443"
      - "80:80"
    volumes:
      - /opt/nginx-webui/data:/app/data
    environment:
      - APP_PORT=8000
      - CERTBOT_CONFIG_DIR=/app/data/letsencrypt
    restart: always
