version: '3.8'

services:
  nginx-webui:
    build: .
    container_name: nginx-webui
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx 配置
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Nginx 多版本安装与编译日志（可选持久化）
      - ./nginx/versions:/app/nginx/versions
      - ./nginx/build_logs:/app/nginx/build_logs
      # 日志
      - ./data/logs:/var/log/nginx
      # 静态文件
      - ./data/html:/usr/share/nginx/html
      # SSL 证书
      - ./data/ssl:/etc/nginx/ssl
      # 应用数据
      - ./backend/data:/app/backend/data
      - ./backend/config.yaml:/app/backend/config.yaml:ro
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - NGINX_CONFIG_PATH=/etc/nginx/nginx.conf
      - NGINX_STATIC_DIR=/usr/share/nginx/html
      - NGINX_SSL_DIR=/etc/nginx/ssl
    restart: unless-stopped

